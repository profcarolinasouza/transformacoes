<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR: Transformações da Matéria</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>

<body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs='sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;'>

        <a-assets>
            <img id="chaleiraImg" src="https://cdn.pixabay.com/photo/2016/11/29/13/24/beverages-1869818_1280.jpg"> <img id="geloImg" src="https://cdn.pixabay.com/photo/2014/12/21/23/51/ice-576302_1280.jpg">     <img id="geloSecoImg" src="https://cdn.pixabay.com/photo/2015/09/05/20/02/dry-ice-924641_1280.jpg"> </a-assets>

        <a-marker type='barcode' value='1'>
            <a-image 
                src="#chaleiraImg" 
                rotation="-90 0 0" 
                position="0 0.1 0" 
                width="1.5" 
                height="1.5"
                animation="property: position; to: 0 0.3 0; dur: 1000; easing: easeInOutSine; loop: true; dir: alternate"
            ></a-image>
        </a-marker>

        <a-marker type='barcode' value='2'>
            <a-image 
                src="#geloImg" 
                rotation="-90 0 0" 
                position="0 0.1 0" 
                width="1.5" 
                height="1.5"
            ></a-image>
        </a-marker>

        <a-marker type='barcode' value='3'>
            <a-image 
                src="#geloSecoImg" 
                rotation="-90 0 0" 
                position="0 0.1 0" 
                width="1.5" 
                height="1.5"
                animation="property: scale; to: 1.1 1.1 1.1; dur: 500; easing: easeInOutQuad; loop: true; dir: alternate"
            ></a-image>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
