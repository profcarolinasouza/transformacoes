<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>WebAR - Transformações da Matéria</title>
    <!-- Carregando bibliotecas de visualização 3D e IA -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #canvas-ar { width: 100vw; height: 100vh; position: absolute; z-index: 1; }
        #webcam { transform: scaleX(-1); position: absolute; opacity: 0; width: 640px; height: 480px; }
        .ui-feedback { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10; background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 20px; text-align: center; }
    </style>
</head>
<body>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="canvas-ar"></canvas>
    <div id="ui" class="ui-feedback">Abra a boca ou uma das mãos para começar!</div>

    <script type="module">
        // A lógica do filtro se divide em 3 etapas principais:
        // 1. Inicializar a câmera e a cena 3D (Three.js)
        // 2. Carregar os modelos de IA (MediaPipe Face & Hand Landmarker)
        // 3. Loop de detecção: atualizar a posição dos objetos 3D com base nas coordenadas do corpo

        let faceLandmarker;
        let handLandmarker;
        let video = document.getElementById("webcam");
        
        // Elementos 3D virtuais que serão criados
        let chaleira3D, gelo3D, geloSeco3D; 

        async function iniciarFiltro() {
            // [Configuração do Three.js e WebCam omitida para simplificação]
            await carregarModelosIA();
            prepararEfeitosQuimicos();
            loopAumentado();
        }

        async function carregarModelosIA() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            
            // Rastreador de Rosto (para a boca)
            faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "face_landmarker.task" },
                outputFaceBlendshapes: true,
                runningMode: "VIDEO"
            });

            // Rastreador de Mãos (para as mãos direita e esquerda)
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: "hand_landmarker.task" },
                numHands: 2,
                runningMode: "VIDEO"
            });
        }

        function verificarGatilhos(faceResult, handResult) {
            const uiText = document.getElementById("ui");

            // 1. Teste da Boca (Fusão)
            if (faceResult?.faceBlendshapes?.[0]) {
                const jawOpen = faceResult.faceBlendshapes[0].categories.find(c => c.categoryName === "jawOpen")?.score;
                if (jawOpen > 0.5) { // Boca bem aberta
                    exibirEfeito(gelo3D, true);
                    uiText.innerText = "FUSÃO: O gelo sólido absorve calor e passa para o estado líquido!";
                    return;
                } else { exibirEfeito(gelo3D, false); }
            }

            // 2. Teste das Mãos (Ebulição e Sublimação)
            if (handResult?.landmarks?.length > 0) {
                handResult.landmarks.forEach((mão, index) => {
                    const tipoMao = handResult.handedness[index][0].categoryName; // "Left" ou "Right"
                    const estaAberta = checarMaoAberta(mão);

                    if (estaAberta && tipoMao === "Right") {
                        posicionarNoElemento(chaleira3D, mão[9]); // Fixa na palma da mão
                        exibirEfeito(chaleira3D, true);
                        uiText.innerText = "EBULIÇÃO: A água líquida evapora rapidamente com o calor!";
                    } else if (estaAberta && tipoMao === "Left") {
                        posicionarNoElemento(geloSeco3D, mão[9]);
                        exibirEfeito(geloSeco3D, true);
                        uiText.innerText = "SUBLIMAÇÃO: O CO₂ sólido vira gás diretamente, sem virar líquido!";
                    }
                });
            } else {
                exibirEfeito(chaleira3D, false);
                exibirEfeito(geloSeco3D, false);
            }
        }

        function checarMaoAberta(landmarks) {
            // Lógica geométrica simples: se a ponta dos dedos estiver mais alta que as juntas, a mão está aberta
            return landmarks[8].y < landmarks[6].y && landmarks[12].y < landmarks[10].y;
        }

        // Inicializa o processo ao carregar a página
        window.onload = iniciarFiltro;
    </script>
</body>
</html>
