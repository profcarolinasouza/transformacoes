<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Laboratório de Ciências - Realidade Aumentada</title>
    
    <!-- Biblioteca leve e ultra otimizada para leitura de códigos no iPhone/Android -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        /* Câmera real ocupando a tela inteira */
        #leitor-camera { width: 100vw; height: 100vh; object-fit: cover; }
        
        /* Interface de orientação para o estudante */
        .ui-aluno {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; background: rgba(0, 0, 0, 0.85); color: #fff;
            padding: 15px 25px; border-radius: 30px; text-align: center;
            font-size: 15px; width: 85%; max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4); pointer-events: none;
            border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease;
        }

        /* Camada que exibe a imagem sobreposta (Efeito RA) */
        #container-ra {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 5; pointer-events: none; display: none; text-align: center; width: 80%; max-width: 400px;
        }

        #imagem-materia {
            width: 100%; height: auto; border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 3px solid #fff;
            animation: flutuar 3000ms ease-in-out infinite alternate;
        }

        @keyframes flutuar {
            from { transform: translateY(0px); }
            to { transform: translateY(-15px); }
        }
    </style>
</head>
<body>

    <!-- Visualizador de Vídeo Nativo -->
    <div id="leitor-camera"></div>

    <!-- Projeção da Imagem do Fenômeno -->
    <div id="container-ra">
        <img id="imagem-materia" src="" alt="Fenômeno Químico">
    </div>

    <!-- Caixa de Texto Dinâmica -->
    <div id="instrucoes" class="ui-aluno">
        Aguardando permissão da câmera...
    </div>

    <script>
        const caixaTexto = document.getElementById("instrucoes");
        const containerRA = document.getElementById("container-ra");
        const imagemMateria = document.getElementById("imagem-materia");
        
        let ultimoCodigoLeitura = null;
        let timeoutLimpar = null;

        // Mapeamento prático das imagens (Links HD estáveis do Unsplash)
        const bancoImagens = {
            "materia_01": "https://thumbs.dreamstime.com/b/chaleira-de-ebuli%C3%A7%C3%A3o-41141046.jpg", // Chaleira fervendo
            "materia_02": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTJtRxkoearbntF6-ND-zN9MfQsVProsYD_RQ&s", // Gelo derretendo
            "materia_03": "https://bartenderstore.com.br/wp-content/uploads/2024/08/experiment-with-dry-ice-in-a-glass-on-a-dark-backg-2023-11-27-05-06-26-utc-scaled.jpg"  // Fumaça/Gelo Seco
        };

        function iniciarCamera() {
            // Configurações nativas do scanner de alta performance
            const html5QrcodeScanner = new Html5Qrcode("leitor-camera");
            
            const config = { 
                fps: 25, // Quadros por segundo altos para leitura instantânea
                qrbox: (width, height) => {
                    return { width: width * 0.7, height: height * 0.5 };
                },
                aspectRatio: window.innerWidth / window.innerHeight
            };

            // Dispara o fluxo de vídeo usando a câmera traseira padrão do dispositivo
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                config,
                aoDetectarCodigo,
                aoClarearFeedback
            )
            .then(() => {
                caixaTexto.innerText = "Câmera ativada! Enquadre um QR Code para ver o fenômeno.";
            })
            .catch((err) => {
                caixaTexto.innerText = "Erro: Vá em Ajustes > Safari > Câmera e permita o acesso.";
                console.error(err);
            });
        }

        function aoDetectarCodigo(decodedText) {
            // Se o código lido fizer parte do experimento
            if (bancoImagens[decodedText]) {
                
                // Cancela o timer de sumir com a imagem se o aluno continuar apontando
                if (timeoutLimpar) clearTimeout(timeoutLimpar);

                // Evita processamento repetido se for o mesmo código
                if (ultimoCodigoLeitura !== decodedText) {
                    ultimoCodigoLeitura = decodedText;
                    
                    // Aplica a imagem correspondente
                    imagemMateria.src = bancoImagens[decodedText];
                    containerRA.style.display = "block";

                    // Altera os textos pedagógicos sem revelar o nome da transformação
                    if (decodedText === "materia_01") {
                        caixaTexto.innerText = "Fenômeno 01";
                    } else if (decodedText === "materia_02") {
                        caixaTexto.innerText = "Fenômeno 02";
                    } else if (decodedText === "materia_03") {
                        caixaTexto.innerText = "Fenômeno 03";
                    }
                }

                // Se o aluno afastar a câmera do código por mais de 4 segundos, remove a projeção
                timeoutLimpar = setTimeout(() => {
                    containerRA.style.display = "none";
                    ultimoCodigoLeitura = null;
                    caixaTexto.innerText = "Enquadre outro QR Code para analisar o próximo fenômeno.";
                }, 4000);
            }
        }

        function aoClarearFeedback() {
            // Função interna necessária para o fluxo estável da biblioteca
        }

        // Garante a execução assim que o DOM carregar totalmente
        document.addEventListener("DOMContentLoaded", iniciarCamera);
    </script>
</body>
</html>
